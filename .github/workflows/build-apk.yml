name: Build and Publish Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GRADLE_VERSION: '8.7'
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle user home
        uses: actions/cache@v4
        # allow cache failures to not break the build (service can be flaky)
        continue-on-error: true
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/gradle-${{ env.GRADLE_VERSION }}
          key: ${{ runner.os }}-gradle-${{ env.GRADLE_VERSION }}-${{ hashFiles('android-sample/**/*.gradle*','android-sample/settings.gradle.kts','android-sample/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Gradle distribution
        shell: bash
        run: |
          set -euo pipefail
          GRADLE_HOME="$HOME/.gradle/gradle-${GRADLE_VERSION}"
          if [ ! -x "$GRADLE_HOME/bin/gradle" ]; then
            mkdir -p "$HOME/.gradle"
            curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o "$HOME/.gradle/gradle-${GRADLE_VERSION}-bin.zip"
            unzip -q -o "$HOME/.gradle/gradle-${GRADLE_VERSION}-bin.zip" -d "$HOME/.gradle"
          fi
          echo "$GRADLE_HOME/bin" >> "$GITHUB_PATH"

      - name: Diagnostics: environment
        shell: bash
        run: |
          set -euo pipefail
          echo "---- PATH ----"
          echo "$PATH"
          echo "---- java -version ----"
          java -version || true
          echo "---- which unzip ----"
          which unzip || true
          echo "---- gradle location ----"
          if [ -x "$GRADLE_HOME/bin/gradle" ]; then
            "$GRADLE_HOME/bin/gradle" --version || true
          else
            echo "Gradle not found in expected location"
          fi
          echo "---- android-sample tree ----"
          ls -la android-sample || true
          ls -la android-sample/app || true

      - name: Ensure Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          if command -v sdkmanager >/dev/null 2>&1; then
            yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses >/dev/null
            sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          else
            echo "sdkmanager not found; using preinstalled Android SDK on runner"
          fi

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          echo "Running: gradle -p android-sample assembleDebug"
          if ! gradle -p android-sample assembleDebug; then
            echo "Gradle build failed. Dumping logs and environment for debugging."
            echo "-- ls android-sample --"
            ls -la android-sample || true
            echo "-- gradle --version --"
            gradle --version || true
            exit 1
          fi

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android-sample/app/build/outputs/apk/debug/app-debug.apk
