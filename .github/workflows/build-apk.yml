name: Build and Publish Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GRADLE_VERSION: '8.7'
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle user home
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/gradle-${{ env.GRADLE_VERSION }}
          key: ${{ runner.os }}-gradle-${{ env.GRADLE_VERSION }}-${{ hashFiles('android-sample/**/*.gradle*','android-sample/settings.gradle.kts','android-sample/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Gradle distribution
        shell: bash
        run: |
          set -euo pipefail
          GRADLE_HOME="$HOME/.gradle/gradle-${GRADLE_VERSION}"
          if [ ! -x "$GRADLE_HOME/bin/gradle" ]; then
            mkdir -p "$HOME/.gradle"
            curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o "$HOME/.gradle/gradle-${GRADLE_VERSION}-bin.zip"
            unzip -q -o "$HOME/.gradle/gradle-${GRADLE_VERSION}-bin.zip" -d "$HOME/.gradle"
          fi
          echo "$GRADLE_HOME/bin" >> "$GITHUB_PATH"

      - name: Ensure Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          if command -v sdkmanager >/dev/null 2>&1; then
            yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses >/dev/null
            sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          else
            echo "sdkmanager not found; using preinstalled Android SDK on runner"
          fi

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          gradle -p android-sample assembleDebug

      - name: Publish APK to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          APK_PATH="android-sample/app/build/outputs/apk/debug/app-debug.apk"
          TAG="apk-${GITHUB_RUN_NUMBER}"
          TITLE="APK build ${GITHUB_RUN_NUMBER}"
          NOTES="Automated Android APK build from GitHub Actions"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK_PATH#app-debug-${GITHUB_RUN_NUMBER}.apk" --clobber
          else
            gh release create "$TAG" "$APK_PATH#app-debug-${GITHUB_RUN_NUMBER}.apk" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest=false \
              --prerelease
          fi
